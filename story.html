<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>เรื่องราวไร่ — ไร่ดี</title>
  <style>
    body { font-family: system-ui, "Sarabun", sans-serif; margin: 0; padding: 16px; background: #f5faf6; color: #1b2e24; }
    h1 { font-size: 1.35rem; margin: 0 0 8px; }
    .meta { color: #5a6b5f; font-size: 0.9rem; margin-bottom: 16px; }
    .chip { display: inline-block; background: #e8f5e9; padding: 4px 10px; border-radius: 999px; font-size: 0.85rem; margin: 8px 0; }
    ul { padding-left: 1.1rem; line-height: 1.55; }
    li { margin-bottom: 8px; }
    .err { color: #b71c1c; text-align: center; margin-top: 40px; }
    .foot { margin-top: 28px; font-size: 0.8rem; color: #6d7d72; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    function b64urlToUtf8(s) {
      s = s.replace(/-/g, "+").replace(/_/g, "/");
      while (s.length % 4) s += "=";
      const bin = atob(s);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder("utf-8").decode(bytes);
    }
    function run() {
      const params = new URLSearchParams(window.location.search);
      const p = params.get("p");
      const el = document.getElementById("root");
      if (!p) {
        el.innerHTML = "<p class='err'>ไม่พบข้อมูลลิงก์ (พารามิเตอร์ p)</p>";
        return;
      }
      let data;
      try {
        data = JSON.parse(b64urlToUtf8(p));
      } catch (e) {
        el.innerHTML = "<p class='err'>ลิงก์ไม่ถูกต้องหรือข้อมูลเสียหาย</p>";
        return;
      }
      if (data.v !== 1 || !Array.isArray(data.b)) {
        el.innerHTML = "<p class='err'>รูปแบบข้อมูลไม่รองรับ</p>";
        return;
      }
      const title = data.title || "เรื่องราวจากไร่";
      const farmer = data.farmer || "เกษตรกร";
      const farm = data.farm || "แปลง";
      const prov = data.prov || "—";
      const dist = data.dist || "—";
      let html = "<h1>" + escapeHtml(title) + "</h1>";
      html += "<div class='meta'><strong>" + escapeHtml(farmer) + "</strong> · " + escapeHtml(farm) + "<br/>" + escapeHtml(prov) + " · " + escapeHtml(dist) + "</div>";
      if (data.brand) html += "<div class='chip'>แบรนด์: " + escapeHtml(data.brand) + "</div>";
      if (data.prod) html += "<p><strong>" + escapeHtml(data.prod) + "</strong></p>";
      html += "<p><strong>พืชหลัก:</strong> " + escapeHtml(data.crop || "—") + "</p><ul>";
      data.b.forEach(function (line) {
        html += "<li>" + escapeHtml(String(line)) + "</li>";
      });
      html += "</ul><p class='foot'>ข้อมูลจากแอปไร่ดี — ไม่ใช่เอกสารรับรองจากหน่วยงาน</p>";
      el.innerHTML = html;
    }
    function escapeHtml(t) {
      const d = document.createElement("div");
      d.textContent = t;
      return d.innerHTML;
    }
    run();
  </script>
</body>
</html>
